<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h4 {
            padding: 0%;
            color: black;
            font-style: italic;
            font-family: arial;
            font-weight: 600;
            position: absolute;
            top: -13%;
            right: 266px;
            font-size: 20px
        }
        
        fieldset {
            max-width: 300px;
            height: 350px;
            border: 4px solid black;
            border-radius: 17%;
            background-color: rgb(190, 190, 190)
        }
        
        body {
            position: relative;
            top: 200px;
            right: -250px;
            background-color: rgb(255, 255, 255)
        }
        
        .campo {
            background-color: rgb(216, 216, 216);
            border: 3px solid green;
            width: 80%;
            height: 10%;
            position: relative;
            left: 8%;
        }
        
        .botao {
            width: 18%;
            height: 14%;
            background-color: rgba(0, 3, 3, 0.61);
            border: 1.5px solid rgb(0, 0, 0);
            cursor: pointer;
            padding: 5%;
            border-radius: 20%;
        }
        
        .botao2 {
            width: 18%;
            height: 14%;
            background-color: rgb(37, 158, 107);
            border: 1.5px solid rgb(0, 0, 0);
            cursor: pointer;
            border-radius: 20%;
        }
        
        .botao3 {
            width: 18%;
            height: 14%;
            background-color: rgb(178, 26, 117);
            border: 1.5px solid rgb(0, 0, 0);
            cursor: pointer;
            border-radius: 20%;
        }
        
        .botao4 {
            width: 18%;
            height: 14%;
            background-color: rgb(178, 77, 26);
            border: 1.5px solid rgb(0, 0, 0);
            cursor: pointer;
            border-radius: 20%;
        }
    </style>
    <script>
        function adicionar(valor) {
            document.getElementById("campo").value += valor;
        }

        function reset() {
            document.getElementById("campo").value = "";
        }

        function calcular() {
            var campo = document.getElementById("campo");
            try {
                campo.value = eval(campo.value)
            } catch (ERROR) {
                campo.value = "Erro";
            }
        }
    </script>
</head>

<body>
    <form>
        <fieldset>
            <h4>CALCULADORA DO 2ºA</h4>
            <input type="text" id="campo" class="campo float"><br><br>
            <button onclick="adicionar('1')" class="botao">1</button>
            <button onclick="adicionar('2')" class="botao">2</button>
            <button onclick="adicionar('3')" class="botao">3</button>
            <button onclick="adicionar('.')" class="botao2">.</button>
            <button onclick="adicionar('^')" class="botao2">^</button>
            <br>
            <button onclick="adicionar('4')" class="botao">4</button>
            <button onclick="adicionar('5')" class="botao">5</button>
            <button onclick="adicionar('6')" class="botao">6</button>
            <button onclick="adicionar('/')" class="botao2">/</button>
            <button onclick="adicionar('')" class="botao2">(</button>
            <br>
            <button onclick="adicionar('7')" class="botao">7</button>
            <button onclick="adicionar('8')" class="botao">8</button>
            <button onclick="adicionar('9')" class="botao">9</button>
            <button onclick="adicionar('+')" class="botao2">+</button>
            <button onclick="adicionar('')" class="botao2">)</button>
            <br>
            <button onclick="adicionar('*')" class="botao2">*</button>
            <button onclick="adicionar('0')" class="botao">0</button>
            <button onclick="adicionar(',')" class="botao2">,</button>
            <button onclick="adicionar('-')" class="botao2">-</button>
            <button onclick="adicionar('%')" class="botao2">%</button>
            <br>
            <button onclick="reset()" class="botao3">C</button>
            <button onclick="calcular()" class="botao4">=</button>
        </fieldset>
    </form>
</body>

</html>
